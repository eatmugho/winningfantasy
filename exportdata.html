<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Firestore Data Exporter</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            padding: 40px; 
            background: #f5f5f7; 
            color: #333; 
        }
        .container { 
            max-width: 800px; 
            margin: 0 auto; 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
        }
        button { 
            background: #0071e3; 
            color: white; 
            border: none; 
            padding: 14px 24px; 
            font-size: 16px; 
            border-radius: 8px; 
            cursor: pointer; 
            width: 100%; 
            font-weight: 600; 
            transition: background 0.2s; 
            margin-bottom: 12px;
        }
        button:hover { background: #0077ed; }
        button:disabled { background: #a2a2a2; cursor: not-allowed; }
        .button-group button {
            width: auto;
            margin-right: 10px;
        }
        #progress-bar { 
            width: 0%; 
            height: 6px; 
            background: #0071e3; 
            margin-top: 15px; 
            border-radius: 3px; 
            transition: width 0.1s; 
        }
        #log { 
            margin-top: 20px; 
            padding: 15px; 
            background: #1d1d1f; 
            color: #00ff66; 
            font-family: monospace; 
            border-radius: 6px; 
            max-height: 400px; 
            overflow-y: auto; 
            font-size: 13px; 
            white-space: pre-wrap; 
        }
        .download-btn {
            background: #34c759;
            margin-top: 10px;
        }
        .download-btn:hover {
            background: #2bb24f;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Firestore Data Exporter</h2>
    <p>Export data from your Firestore collections (User, Event, Match, UserMatchScore).</p>
    
    <div class="button-group">
        <button id="exportAllBtn">Export All Collections</button>
        <button id="exportUsersBtn">Export Users Only</button>
        <button id="exportEventsBtn">Export Events Only</button>
        <button id="exportMatchesBtn">Export Matches Only</button>
        <button id="exportScoresBtn">Export UserMatchScores Only</button>
    </div>

    <div id="progress-bar"></div>
    <div id="log">Ready. Click a button to start exporting...</div>

    <div id="downloadLinks" style="margin-top: 20px;"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Your Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyBkvD9abm5J7mLPuEO8kt2mXQcKRshVv4M",
        authDomain: "winningfantasy.firebaseapp.com",
        projectId: "winningfantasy",
        storageBucket: "winningfantasy.appspot.com",
        messagingSenderId: "1030044797745",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const logEl = document.getElementById('log');
    const progressBar = document.getElementById('progress-bar');
    const downloadLinksEl = document.getElementById('downloadLinks');

    function log(message) {
        logEl.innerHTML += message + "\n";
        logEl.scrollTop = logEl.scrollHeight;
    }

    function updateProgress(current, total) {
        const percentage = total > 0 ? (current / total) * 100 : 100;
        progressBar.style.width = `${percentage}%`;
    }

    function resetUI() {
        progressBar.style.width = '0%';
        downloadLinksEl.innerHTML = '';
    }

    function createDownloadLink(data, filename) {
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        
        const link = document.createElement('a');
        link.href = url;
        link.download = filename;
        link.textContent = `📥 Download ${filename}`;
        link.className = 'download-btn';
        link.style.display = 'inline-block';
        link.style.padding = '12px 20px';
        link.style.textDecoration = 'none';
        link.style.borderRadius = '8px';
        link.style.marginRight = '10px';
        
        return link;
    }

    async function exportCollection(collectionName, displayName) {
        resetUI();
        log(`🔍 Fetching ${displayName}...`);
        
        try {
            const colRef = collection(db, collectionName);
            const snapshot = await getDocs(colRef);
            
            const data = [];
            snapshot.forEach(doc => {
                data.push({
                    id: doc.id,
                    ...doc.data()
                });
            });

            log(`✅ Exported ${data.length} ${displayName} document(s).`);
            
            // Create download link
            const link = createDownloadLink(data, `${collectionName.toLowerCase()}_export.json`);
            downloadLinksEl.appendChild(link);
            
            return data;
            
        } catch (error) {
            log(`❌ Error exporting ${displayName}: ${error.message}`);
            console.error(error);
        }
    }

    async function exportAll() {
        resetUI();
        log("🚀 Starting full export...");
        
        const totalCollections = 4;
        let completed = 0;
        
        const users = await exportCollection("User", "Users");
        completed++;
        updateProgress(completed, totalCollections);
        
        const events = await exportCollection("Event", "Events");
        completed++;
        updateProgress(completed, totalCollections);
        
        const matches = await exportCollection("Match", "Matches");
        completed++;
        updateProgress(completed, totalCollections);
        
        const scores = await exportCollection("UserMatchScore", "UserMatchScores");
        completed++;
        updateProgress(completed, totalCollections);
        
        log("\n🎉 Full export completed! Download links are available above.");
    }

    // Button listeners
    document.getElementById('exportAllBtn').addEventListener('click', exportAll);
    
    document.getElementById('exportUsersBtn').addEventListener('click', () => {
        exportCollection("User", "Users");
    });
    
    document.getElementById('exportEventsBtn').addEventListener('click', () => {
        exportCollection("Event", "Events");
    });
    
    document.getElementById('exportMatchesBtn').addEventListener('click', () => {
        exportCollection("Match", "Matches");
    });
    
    document.getElementById('exportScoresBtn').addEventListener('click', () => {
        exportCollection("UserMatchScore", "UserMatchScores");
    });

    log("✅ Exporter initialized. Ready to pull data from Firestore.");
</script>

</body>
</html>
