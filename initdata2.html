    const userMatchScores = [
    ];

    const logEl = document.getElementById('log');
    const btn = document.getElementById('importBtn');
    const progressBar = document.getElementById('progress-bar');

    function log(message) {
        logEl.innerHTML += message + "\n";
        logEl.scrollTop = logEl.scrollHeight;
    }

    function updateProgress(current, total) {
        const percentage = (current / total) * 100;
        progressBar.style.width = `${percentage}%`;
    }

    async function importData() {
        btn.disabled = true;
        logEl.innerHTML = "Starting batch writing process...\n";
        
        const totalItems = users.length + events.length + matches.length + userMatchScores.length;
        let processedItems = 0;

        try {
            // 1. Users
            log("--- 👤 Importing Users ---");
            for (const user of users) {
                await setDoc(doc(db, "User", user.Cd), user);
                processedItems++;
                updateProgress(processedItems, totalItems);
            }
            log(`Successfully written ${users.length} user document(s).`);

            // 2. Events
            log("\n--- 🏆 Importing Events ---");
            for (const event of events) {
                await setDoc(doc(db, "Event", event.Cd), event);
                processedItems++;
                updateProgress(processedItems, totalItems);
            }
            log(`Successfully written ${events.length} event document(s).`);

            // 3. Matches
            log("\n--- ⚽ Importing Matches (This may take a moment...) ---");
            for (const match of matches) {
                await setDoc(doc(db, "Match", match.Cd), match);
                processedItems++;
                updateProgress(processedItems, totalItems);
            }
            log(`Successfully written ${matches.length} match documents.`);

            // 4. UserMatchScores
            log("\n--- 📝 Importing User Match Scores ---");
            for (const ums of userMatchScores) {
                const docId = `${ums.UserCd}-${ums.MatchCd}`;
                await setDoc(doc(db, "UserMatchScore", docId), ums);
                processedItems++;
                updateProgress(processedItems, totalItems);
            }
            log(`Successfully written ${userMatchScores.length} score projection documents.`);

            log("\n🎉 Deployment successful! 100% of data from collections.xlsx is now active on Firestore.");

        } catch (error) {
            log(`\n❌ Execution Error: ${error.message}`);
            console.error(error);
        } finally {
            btn.disabled = false;
        }
    }

    btn.addEventListener('click', importData);
</script>
